      width: 100vw;

      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

      user-select: none;
      -webkit-app-region: drag;

    .splash-logo {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      margin-bottom: 24px;
      background: #000;
    }
    .splash-title {
      color: #F5DEB3;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 32px;
    }
    .splash-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(245, 222, 179, 0.2);
      border-top-color: #F5DEB3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
